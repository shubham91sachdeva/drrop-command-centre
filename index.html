<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Drrop Mix — Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Outfit:wght@300;400;600;700;900&display=swap" rel="stylesheet"/>
<style>
  :root {
    --black: #0A0A0A;
    --white: #FAFAF8;
    --yellow: #F5C400;
    --mid: #4A4A4A;
    --light: #9A9A9A;
    --border: rgba(245,196,0,0.18);
    --card-bg: #141414;
    --hover-bg: #1E1E1E;
    --danger: #F4578A;
    --success: #3DAA3A;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Outfit', sans-serif;
    background: var(--black);
    color: var(--white);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* NOISE TEXTURE */
  body::before {
    content: '';
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
  }

  /* NAV */
  nav {
    position: sticky; top: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 32px;
    height: 56px;
    background: rgba(10,10,10,0.92);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
  }
  .nav-logo img { height: 28px; filter: invert(1) brightness(1.1); }
  .nav-badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px; letter-spacing: 1.5px;
    background: var(--yellow); color: var(--black); font-weight: 700;
    padding: 4px 10px; border-radius: 100px; text-transform: uppercase;
  }

  /* MAIN */
  main { position: relative; z-index: 1; max-width: 1100px; margin: 0 auto; padding: 48px 24px 80px; }

  /* HEADER */
  .dash-header { margin-bottom: 40px; }
  .dash-header h1 {
    font-family: 'Outfit', sans-serif;
    font-size: clamp(28px, 4vw, 42px);
    font-weight: 900; letter-spacing: -0.5px;
    line-height: 1.1;
  }
  .dash-header h1 span { color: var(--yellow); }
  .dash-header p {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; letter-spacing: 2px; text-transform: uppercase;
    color: var(--light); margin-top: 8px;
  }

  /* GRID */
  .tab-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 16px;
  }

  /* TAB CARD */
  .tab-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
    display: flex; flex-direction: column; gap: 16px;
    transition: border-color 0.2s, transform 0.15s, background 0.2s;
    position: relative;
    overflow: hidden;
  }
  .tab-card:hover {
    border-color: rgba(245,196,0,0.45);
    background: var(--hover-bg);
    transform: translateY(-2px);
  }
  .tab-card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: var(--yellow);
    opacity: 0;
    transition: opacity 0.2s;
  }
  .tab-card:hover::before { opacity: 1; }

  /* ADD CARD */
  .tab-card.add-card {
    border-style: dashed;
    border-color: rgba(245,196,0,0.2);
    cursor: pointer;
    align-items: center; justify-content: center;
    min-height: 180px;
    flex-direction: column; gap: 8px;
  }
  .tab-card.add-card:hover { border-color: rgba(245,196,0,0.5); }
  .add-icon {
    width: 40px; height: 40px; border-radius: 50%;
    background: rgba(245,196,0,0.1);
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; color: var(--yellow);
    transition: background 0.2s;
  }
  .tab-card.add-card:hover .add-icon { background: rgba(245,196,0,0.2); }
  .add-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
    color: var(--light);
  }

  /* CARD INTERNALS */
  .card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
  .card-icon {
    width: 40px; height: 40px; border-radius: 10px;
    background: rgba(245,196,0,0.12);
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; flex-shrink: 0;
  }
  .card-actions { display: flex; gap: 6px; opacity: 0; transition: opacity 0.2s; }
  .tab-card:hover .card-actions { opacity: 1; }
  .btn-icon {
    width: 28px; height: 28px; border-radius: 8px; border: 1px solid var(--border);
    background: rgba(255,255,255,0.05); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; color: var(--light);
    transition: background 0.15s, color 0.15s;
  }
  .btn-icon:hover { background: rgba(245,196,0,0.15); color: var(--yellow); }
  .btn-icon.del:hover { background: rgba(244,87,138,0.15); color: var(--danger); }

  .card-name {
    font-size: 17px; font-weight: 700; letter-spacing: -0.2px;
    cursor: default;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .card-url {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; color: var(--light);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    letter-spacing: 0.5px;
  }

  /* BUTTONS */
  .card-btns { display: flex; gap: 8px; margin-top: 4px; }
  .btn-open {
    flex: 1; padding: 10px 0;
    background: var(--yellow); color: var(--black);
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase;
    border: none; border-radius: 8px; cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
  }
  .btn-open:hover { opacity: 0.88; transform: scale(0.98); }
  .btn-open.secondary {
    background: rgba(245,196,0,0.12); color: var(--yellow);
    border: 1px solid rgba(245,196,0,0.25);
  }
  .btn-open.secondary:hover { background: rgba(245,196,0,0.2); }

  /* MODAL */
  .modal-overlay {
    display: none; position: fixed; inset: 0; z-index: 200;
    background: rgba(0,0,0,0.75); backdrop-filter: blur(4px);
    align-items: center; justify-content: center;
  }
  .modal-overlay.active { display: flex; }
  .modal {
    background: #161616; border: 1px solid var(--border);
    border-radius: 20px; padding: 32px; width: 100%; max-width: 420px;
    animation: modal-in 0.2s ease;
  }
  @keyframes modal-in {
    from { opacity:0; transform: scale(0.95) translateY(8px); }
    to   { opacity:1; transform: scale(1) translateY(0); }
  }
  .modal h3 {
    font-size: 18px; font-weight: 700; margin-bottom: 20px;
  }
  .modal h3 span { color: var(--yellow); }
  .modal label {
    display: block;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
    color: var(--light); margin-bottom: 6px; margin-top: 16px;
  }
  .modal label:first-of-type { margin-top: 0; }
  .modal input {
    width: 100%; padding: 10px 14px;
    background: rgba(255,255,255,0.06); border: 1px solid var(--border);
    border-radius: 8px; color: var(--white);
    font-family: 'Outfit', sans-serif; font-size: 14px;
    outline: none; transition: border-color 0.2s;
  }
  .modal input:focus { border-color: var(--yellow); }
  .modal-emoji-row {
    display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px;
  }
  .emoji-pick {
    width: 36px; height: 36px; border-radius: 8px;
    background: rgba(255,255,255,0.06); border: 1px solid transparent;
    cursor: pointer; font-size: 18px;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s, border-color 0.15s;
  }
  .emoji-pick:hover, .emoji-pick.selected {
    background: rgba(245,196,0,0.15); border-color: var(--yellow);
  }
  .modal-actions { display: flex; gap: 10px; margin-top: 24px; }
  .btn-modal {
    flex: 1; padding: 11px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase;
    border-radius: 8px; cursor: pointer; border: none;
    transition: opacity 0.15s;
  }
  .btn-modal:hover { opacity: 0.85; }
  .btn-modal.primary { background: var(--yellow); color: var(--black); }
  .btn-modal.ghost { background: rgba(255,255,255,0.08); color: var(--white); }

  /* SECTION DIVIDER */
  .section-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px; letter-spacing: 3px; text-transform: uppercase;
    color: var(--light); margin: 40px 0 16px;
    display: flex; align-items: center; gap: 12px;
  }
  .section-label::after {
    content: ''; flex: 1; height: 1px; background: var(--border);
  }

  /* TOAST */
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
    background: #1E1E1E; border: 1px solid var(--border);
    border-radius: 100px; padding: 10px 20px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; letter-spacing: 1px; color: var(--white);
    z-index: 300; transition: transform 0.3s ease;
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>

<main>
  <div class="dash-header">
    <h1>Drrop <span>Command Centre</span></h1>
    <p>All your tools, one place &mdash; click to open, edit to customise</p>
  </div>

  <div class="section-label">Finance & Operations</div>
  <div class="tab-grid" id="grid-finance"></div>

  <div class="section-label">All Tools</div>
  <div class="tab-grid" id="grid-all"></div>

</main>

<!-- MODAL -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h3 id="modal-title">Add <span>New Tool</span></h3>
    <label>Tool Name</label>
    <input type="text" id="inp-name" placeholder="e.g. Inventory Tracker"/>
    <label>URL</label>
    <input type="text" id="inp-url" placeholder="https://..."/>
    <label>Icon</label>
    <div class="modal-emoji-row" id="emoji-picker"></div>
    <div class="modal-actions">
      <button class="btn-modal ghost" onclick="closeModal()">Cancel</button>
      <button class="btn-modal primary" onclick="saveCard()">Save Tool</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ─── DEFAULT TABS ────────────────────────────────────────────────────────────
const DEFAULT_TABS = [
  { id: 'fin-1', name: 'Financial Spends', url: 'https://docs.google.com/spreadsheets', icon: '💰', section: 'finance' },
  { id: 'fin-2', name: 'Inventory Management', url: 'https://docs.google.com/spreadsheets', icon: '📦', section: 'finance' },
];

const EMOJI_OPTIONS = ['💰','📦','📊','📈','🛒','🧾','📋','🔗','⚡','🎯','🧪','📣','🏷️','🔔','🛠️','📱','💡','🌐','🗂️','🔍'];

// ─── STATE ────────────────────────────────────────────────────────────────────
let tabs = JSON.parse(localStorage.getItem('drrop_tabs') || 'null') || DEFAULT_TABS;
let editingId = null;
let selectedEmoji = '🔗';

function save() {
  localStorage.setItem('drrop_tabs', JSON.stringify(tabs));
}

// ─── RENDER ───────────────────────────────────────────────────────────────────
function render() {
  const finance = tabs.filter(t => t.section === 'finance');
  const all     = tabs.filter(t => t.section !== 'finance');

  document.getElementById('grid-finance').innerHTML =
    finance.map(cardHTML).join('') + addCardHTML('finance');

  document.getElementById('grid-all').innerHTML =
    all.map(cardHTML).join('') + addCardHTML('all');
}

function cardHTML(t) {
  const display = t.url.replace(/^https?:\/\//, '').substring(0, 40);
  return `
    <div class="tab-card" id="card-${t.id}">
      <div class="card-top">
        <div class="card-icon">${t.icon}</div>
        <div class="card-actions">
          <button class="btn-icon" onclick="openEdit('${t.id}')" title="Edit">✏️</button>
          <button class="btn-icon del" onclick="deleteCard('${t.id}')" title="Delete">🗑</button>
        </div>
      </div>
      <div>
        <div class="card-name" title="${esc(t.name)}">${esc(t.name)}</div>
        <div class="card-url" title="${esc(t.url)}">${esc(display)}${t.url.length > 43 ? '…' : ''}</div>
      </div>
      <div class="card-btns">
        <button class="btn-open" onclick="openTab('${t.id}','same')">Open</button>
        <button class="btn-open secondary" onclick="openTab('${t.id}','new')">↗ New Tab</button>
      </div>
    </div>`;
}

function addCardHTML(section) {
  return `
    <div class="tab-card add-card" onclick="openAdd('${section}')">
      <div class="add-icon">+</div>
      <div class="add-label">Add Tool</div>
    </div>`;
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─── OPEN TAB ─────────────────────────────────────────────────────────────────
function openTab(id, mode) {
  const t = tabs.find(x => x.id === id);
  if (!t || !t.url) return;
  const url = t.url.startsWith('http') ? t.url : 'https://' + t.url;
  if (mode === 'new') {
    window.open(url, '_blank');
  } else {
    window.location.href = url;
  }
}

// ─── MODAL ────────────────────────────────────────────────────────────────────
function buildEmojiPicker(selected) {
  const row = document.getElementById('emoji-picker');
  row.innerHTML = EMOJI_OPTIONS.map(e =>
    `<button class="emoji-pick${e === selected ? ' selected' : ''}" onclick="pickEmoji(this,'${e}')">${e}</button>`
  ).join('');
}

function pickEmoji(el, emoji) {
  selectedEmoji = emoji;
  document.querySelectorAll('.emoji-pick').forEach(b => b.classList.remove('selected'));
  el.classList.add('selected');
}

function openAdd(section) {
  editingId = null;
  document.getElementById('modal-title').innerHTML = 'Add <span>New Tool</span>';
  document.getElementById('inp-name').value = '';
  document.getElementById('inp-url').value = '';
  selectedEmoji = '🔗';
  buildEmojiPicker(selectedEmoji);
  document.getElementById('modal').dataset.section = section;
  document.getElementById('modal').classList.add('active');
  setTimeout(() => document.getElementById('inp-name').focus(), 100);
}

function openEdit(id) {
  const t = tabs.find(x => x.id === id);
  if (!t) return;
  editingId = id;
  document.getElementById('modal-title').innerHTML = 'Edit <span>Tool</span>';
  document.getElementById('inp-name').value = t.name;
  document.getElementById('inp-url').value = t.url;
  selectedEmoji = t.icon;
  buildEmojiPicker(selectedEmoji);
  document.getElementById('modal').classList.add('active');
  setTimeout(() => document.getElementById('inp-name').focus(), 100);
}

function closeModal() {
  document.getElementById('modal').classList.remove('active');
  editingId = null;
}

function saveCard() {
  const name = document.getElementById('inp-name').value.trim();
  let url    = document.getElementById('inp-url').value.trim();
  if (!name) { showToast('⚠️ Enter a name'); return; }
  if (!url)  { showToast('⚠️ Enter a URL'); return; }
  if (!url.startsWith('http')) url = 'https://' + url;

  if (editingId) {
    const t = tabs.find(x => x.id === editingId);
    t.name = name; t.url = url; t.icon = selectedEmoji;
    showToast('✅ Tool updated');
  } else {
    const section = document.getElementById('modal').dataset.section || 'all';
    tabs.push({ id: 'tab-' + Date.now(), name, url, icon: selectedEmoji, section });
    showToast('✅ Tool added');
  }
  save(); render(); closeModal();
}

function deleteCard(id) {
  if (!confirm('Remove this tool?')) return;
  tabs = tabs.filter(x => x.id !== id);
  save(); render();
  showToast('🗑 Tool removed');
}

// Close modal on overlay click
document.getElementById('modal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

// ─── TOAST ────────────────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
